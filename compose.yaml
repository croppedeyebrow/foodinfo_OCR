name: kurly-freshness-pipeline

services:
  crawler:
    build:
      context: .
      dockerfile: docker/crawler.Dockerfile
    env_file:
      - .env
    volumes:
      - ./apps/crawler/src:/app/src
      - ./datasets:/data
      - ./tests:/app/tests:ro
    init: true
    shm_size: "1gb"
    command: ["python", "-m", "src.cli", "health"]

  ocr-parser:
    build:
      context: .
      dockerfile: docker/ocr-parser.Dockerfile
    shm_size: "2gb"
    platform: linux/amd64
    env_file:
      - .env
    volumes:
      - ./apps/ocr-parser/src:/app/src
      - ./contracts:/app/contracts:ro
      - ./datasets:/data
      - ./outcome:/outcome
      - ./tests:/app/tests:ro
    command: ["python", "-m", "src.cli", "health"]

  normalizer:
    build:
      context: .
      dockerfile: docker/normalizer.Dockerfile
    env_file:
      - .env
    volumes:
      - ./apps/normalizer/src:/app/src
      - ./contracts:/app/contracts:ro
      - ./datasets:/data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "src.cli", "health"]

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freshness}
      POSTGRES_USER: ${POSTGRES_USER:-freshness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-freshness} -d ${POSTGRES_DB:-freshness}
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
